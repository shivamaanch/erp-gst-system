{% extends "base.html" %}
{% block title %}New Loan Application{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold">📝 New Loan Application</h4>
  <a href="{{ url_for('smf.index') }}" class="btn btn-sm btn-outline-secondary">← Back</a>
</div>
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Applicant Name *</label>
          <input type="text" name="applicant_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Business Name *</label>
          <input type="text" name="business_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Loan Amount (₹) *</label>
          <input type="number" name="loan_amount" class="form-control" required min="100000" step="1000">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Loan Purpose *</label>
          <select name="loan_purpose" class="form-select" required>
            <option value="">-- Select Purpose --</option>
            <option value="Working Capital">Working Capital</option>
            <option value="Business Expansion">Business Expansion</option>
            <option value="Machinery Purchase">Machinery Purchase</option>
            <option value="Technology Upgrade">Technology Upgrade</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Tenure (Months) *</label>
          <input type="number" name="tenure_months" class="form-control" required min="6" max="60">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Existing Loans (₹)</label>
          <input type="number" name="existing_loans" class="form-control" value="0" step="1000">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Collateral Details</label>
          <input type="text" name="collateral_details" class="form-control" placeholder="Property, FD, etc.">
        </div>
      </div>
      
      <div class="mt-4">
        <h5 class="fw-bold">Financial Projections (Next 1 Year)</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Projected Turnover (₹)</label>
            <input type="number" name="projected_turnover" class="form-control" required min="0" step="10000">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Projected Profit (₹)</label>
            <input type="number" name="projected_profit" class="form-control" required step="1000">
          </div>
        </div>
      </div>
      
      <div class="mt-4">
        <button type="submit" class="btn btn-success w-100 py-2">
          <i class="bi bi-save me-2"></i>Submit Application
        </button>
        <a href="{{ url_for('smf.index') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
