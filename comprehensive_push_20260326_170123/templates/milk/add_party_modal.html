<!-- Party Creation Modal -->
<div class="modal fade" id="addPartyModal" tabindex="-1" aria-labelledby="addPartyModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addPartyModalLabel">
          <i class="fas fa-user-plus"></i> Add New Party
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addPartyForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Party Name *</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Phone Number</label>
              <input type="tel" name="phone" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Email</label>
              <input type="email" name="email" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">GST Number</label>
              <input type="text" name="gst_number" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Address (Include City, State, PIN)</label>
              <textarea name="address" class="form-control" rows="2" placeholder="123 Main Street, City Name, State - 123456"></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">State Code</label>
              <input type="text" name="state_code" class="form-control" maxlength="2" placeholder="UP">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Opening Balance</label>
              <input type="number" name="opening_balance" class="form-control" step="0.01" value="0">
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="is_active" checked>
                <label class="form-check-label">Active Party</label>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveNewParty()">
          <i class="fas fa-save"></i> Save Party
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function saveNewParty() {
  const form = document.getElementById('addPartyForm');
  const formData = new FormData(form);
  
  // Simple party creation using form submission
  const partyName = formData.get('name');
  
  if (!partyName || partyName.trim() === '') {
    alert('Please enter a party name');
    return;
  }
  
  // Check for duplicate name (case-insensitive)
  const existingParties = ['SHIVAM', 'Raaina', 'Test Party', 'Office Party'];
  if (existingParties.some(p => p.toLowerCase() === partyName.toLowerCase())) {
    alert(`Party '${partyName}' already exists. Please use a different name.`);
    return;
  }
  
  // Create party via simple form submission
  fetch('/milk/parties/add', {
    method: 'POST',
    body: formData
  })
  .then(response => {
    if (!response.ok) {
      throw new Error('Network response was not ok');
    }
    return response.json();
  })
  .then(data => {
    if (data.success) {
      // Close modal
      const modal = bootstrap.Modal.getInstance(document.getElementById('addPartyModal'));
      modal.hide();
      
      // Add new party to datalist
      const datalist = document.getElementById('partyList');
      const option = document.createElement('option');
      option.value = data.name;
      option.setAttribute('data-id', data.id);
      datalist.appendChild(option);
      
      // Select the new party
      document.getElementById('partyName').value = data.name;
      selectParty();
      
      // Show success message
      alert('Party "' + data.name + '" added successfully!');
      
      // Reset form
      form.reset();
    } else {
      alert('Error: ' + data.message);
    }
  })
  .catch(error => {
    console.error('Error:', error);
    alert('Error adding party: ' + error.message);
  });
}
</script>
