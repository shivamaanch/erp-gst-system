{% extends "base.html" %}
{% block title %}{{ 'Edit Company' if company else 'Add Company' }}{% endblock %}
{% block content %}
<div class="container-fluid">
  <h4 class="mb-4">
    <i class="bi bi-building"></i> {{ 'Edit Company' if company else 'Add New Company' }}
  </h4>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST">
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Company Name *</label>
            <input type="text" name="name" class="form-control" value="{{ company.name if company else '' }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Business Type</label>
            <select name="business_type" class="form-select">
              <option value="Trading" {{ 'selected' if company and company.business_type == 'Trading' else '' }}>Trading</option>
              <option value="Manufacturing" {{ 'selected' if company and company.business_type == 'Manufacturing' else '' }}>Manufacturing</option>
              <option value="Service" {{ 'selected' if company and company.business_type == 'Service' else '' }}>Service</option>
              <option value="Milk" {{ 'selected' if company and company.business_type == 'Milk' else '' }}>Milk</option>
            </select>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">GSTIN</label>
            <input type="text" name="gstin" class="form-control" value="{{ company.gstin if company else '' }}" maxlength="15">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">PAN</label>
            <input type="text" name="pan" class="form-control" value="{{ company.pan if company else '' }}" maxlength="10">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">State Code</label>
            <input type="text" name="state_code" class="form-control" value="{{ company.state_code if company else '' }}" maxlength="2">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Phone</label>
            <input type="tel" name="phone" class="form-control" value="{{ company.phone if company else '' }}">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-bold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ company.email if company else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-bold">Logo Path</label>
            <input type="text" name="logo_path" class="form-control" value="{{ company.logo_path if company else '' }}">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Address</label>
          <textarea name="address" class="form-control" rows="3">{{ company.address if company else '' }}</textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> {{ 'Update Company' if company else 'Create Company' }}
          </button>
          <a href="{{ url_for('company.index') }}" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
