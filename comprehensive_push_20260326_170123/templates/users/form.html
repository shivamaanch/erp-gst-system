{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold">{{ title }}</h4>
  <a href="{{ url_for('users.index') }}" class="btn btn-sm btn-outline-secondary">← Back</a>
</div>
<div class="card border-0 shadow-sm" style="max-width:500px">
  <div class="card-body">
    <form method="POST">
      {% if not user %}
      <div class="mb-3">
        <label class="form-label fw-bold">Username *</label>
        <input type="text" name="username" class="form-control" required placeholder="e.g. accountant1">
      </div>
      {% else %}
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
          <input type="text" class="form-control bg-light" value="{{ user.username }}" disabled>
      </div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label fw-bold">Email</label>
        <input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Role</label>
        <select name="role" class="form-select">
          {% for r in roles %}
          <option value="{{ r }}" {{ 'selected' if (user and user.role==r) or (not user and r=='viewer') }}>
            {{ r.capitalize() }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Password {{ "" if user else "*" }}</label>
        <input type="password" name="password" class="form-control"
               {{ "" if user else "required" }} placeholder="{{ 'Leave blank to keep current' if user else 'Set password' }}">
      </div>
      <button type="submit" class="btn btn-primary w-100">
        {{ "Update User" if user else "Create User" }}
      </button>
    </form>
  </div>
</div>
{% endblock %}
