<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Login — ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1a237e,#283593); min-height:100vh; display:flex; align-items:center; }
    .card { border-radius:18px; }
    .brand { font-size:2.5rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card border-0 shadow-lg">
        <div class="card-body p-4">
          <div class="text-center mb-3">
            <div class="brand">🏢</div>
            <h4 class="fw-bold mb-0">ERP — GST System</h4>
            <small class="text-muted">Accounting & Compliance Suite</small>
          </div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
              <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
            {% endfor %}
          {% endwith %}

          <form method="POST" id="loginForm">
            <div class="mb-3">
              <label class="form-label fw-bold small">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" id="username"
                       class="form-control" value="admin" required autofocus>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold small">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" id="password"
                       class="form-control" value="admin@123" required>
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePw()"><i class="bi bi-eye" id="eyeIcon"></i></button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
              <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="/dev-login" class="btn btn-success btn-sm w-100">
              <i class="bi bi-lightning-fill"></i> Quick Login (Dev Mode — 1 Click)
            </a>
          </div>

          <div class="text-center mt-3 text-muted" style="font-size:.75rem">
            Default: <code>admin</code> / <code>admin@123</code>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function togglePw() {
  const pw = document.getElementById("password");
  const ic = document.getElementById("eyeIcon");
  pw.type = pw.type === "password" ? "text" : "password";
  ic.className = pw.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
}
</script>
</body>
</html>
