<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Two-Factor Auth — ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body{background:linear-gradient(135deg,#1a237e,#283593);min-height:100vh;display:flex;align-items:center;}</style>
</head>
<body>
<div class="container"><div class="row justify-content-center"><div class="col-md-4">
  <div class="card border-0 shadow-lg" style="border-radius:18px">
    <div class="card-body p-4 text-center">
      <i class="bi bi-shield-lock text-primary" style="font-size:3rem"></i>
      <h4 class="mt-2 fw-bold">Two-Factor Authentication</h4>
      <p class="text-muted small">Enter the 6-digit OTP sent to your email.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}<div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>{% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold"
                 maxlength="6" placeholder="000000" autofocus required style="letter-spacing:12px;font-size:2rem">
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">Verify OTP</button>
      </form>
      <div class="mt-3">
        <a href="{{ url_for('auth.login') }}" class="text-muted small">← Back to login</a>
      </div>
    </div>
  </div>
</div></div></div>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
