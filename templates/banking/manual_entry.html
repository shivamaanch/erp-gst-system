{% extends "base.html" %}
{% block title %}Bank Entry - {{ bank.account_name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold">🏦 Bank Entry - {{ bank.account_name }} ({{ bank.bank_name }})</h4>
  <a href="{{ url_for('banking.transactions', bank_id=bank.id) }}" class="btn btn-outline-secondary">
    ← Back to Transactions
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label">Date *</label>
          <input type="date" name="txn_date" class="form-control" value="{{ today }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Description *</label>
          <input type="text" name="description" class="form-control" placeholder="e.g., Payment to Supplier" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Reference No</label>
          <input type="text" name="ref_no" class="form-control" placeholder="Cheque/Transaction No">
        </div>
      </div>
      
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">Account *</label>
          <select name="account_id" class="form-select searchable-select" required>
            <option value="">-- Select Account --</option>
            {% for acc in accounts %}
            <option value="{{ acc.id }}">{{ acc.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Debit Amount</label>
          <input type="number" name="debit" class="form-control" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="col-md-4">
          <label class="form-label">Credit Amount</label>
          <input type="number" name="credit" class="form-control" step="0.01" min="0" placeholder="0.00">
        </div>
      </div>
      
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-save"></i> Save Entry
        </button>
        <a href="{{ url_for('banking.transactions', bank_id=bank.id) }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
