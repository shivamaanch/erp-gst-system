{% extends "base.html" %}
{% block title %}Add Bank Account{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold">🏦 Add Bank Account</h4>
  <a href="{{ url_for('banking.accounts') }}" class="btn btn-sm btn-outline-secondary">← Back</a>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Account Name *</label>
          <input type="text" name="account_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Bank Name *</label>
          <input type="text" name="bank_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Account Number *</label>
          <input type="text" name="account_no" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">IFSC Code</label>
          <input type="text" name="ifsc" class="form-control" maxlength="11">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Branch</label>
          <input type="text" name="branch" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Account Type</label>
          <select name="account_type" class="form-select">
            <option value="Current">Current</option>
            <option value="Savings">Savings</option>
            <option value="OD">Overdraft (OD)</option>
            <option value="CC">Cash Credit (CC)</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Opening Balance</label>
          <input type="number" name="opening_balance" class="form-control" value="0" step="0.01">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle"></i> Save Account
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
