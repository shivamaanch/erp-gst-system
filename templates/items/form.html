{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold">{{ title }}</h4>
  <a href="{{ url_for('items.index') }}" class="btn btn-sm btn-outline-secondary">← Back</a>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Item Name *</label>
          <input type="text" name="name" class="form-control" required value="{{ item.name if item else '' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">HSN Code</label>
          <input type="text" name="hsn_code" class="form-control" value="{{ item.hsn_code if item else '' }}">
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Unit</label>
          <select name="unit" class="form-select">
            {% set current_unit = item.unit if item else 'Nos' %}
            {% for u in ['Nos', 'Kgs', 'Ltrs', 'Mtr', 'Box', 'Pcs', 'Set'] %}
            <option value="{{ u }}" {% if current_unit == u %}selected{% endif %}>{{ u }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">GST Rate (%)</label>
          <input type="number" name="gst_rate" class="form-control" step="0.01" value="{{ item.gst_rate if item else 18 }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Purchase Rate</label>
          <input type="number" name="purchase_rate" class="form-control" step="0.01" value="{{ item.purchase_rate if item else 0 }}">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Sale Rate</label>
          <input type="number" name="sale_rate" class="form-control" step="0.01" value="{{ item.sale_rate if item else 0 }}">
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-success px-4">
            <i class="bi bi-check-circle"></i> {{ 'Update Item' if item else 'Save Item' }}
          </button>
          <a href="{{ url_for('items.index') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
